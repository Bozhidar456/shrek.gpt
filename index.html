<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с Шрек | Влизане в блатото</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="swamp-container">
        <header>
            <div class="shrek-avatar-circle">
                <img src="shrek_portrait.jpg" alt="Шрек"> </div>
            <h1>Чат с истинския Шрек</h1>
            <p> (А не с някакъв „изкуствен интелект“)</p>
        </header>
        
        <main class="chat-window" id="chatWindow">
            <div class="message shrek-message">
                <p><strong>Шрек:</strong> Какво правиш в моето БЛАТО?! Махай се, преди да съм ти изял ушите като лукчета!</p>
            </div>
        </main>
        
        <footer>
            <input type="text" id="userInput" placeholder="Какво искаш, смърдлив човече?">
            <button id="sendBtn" onclick="sendMessage()">Разкарай се!</button>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
